spring.application.name=lindavista-backend

# Carga variables desde un archivo .env (opcional) como si fueran propiedades.
spring.config.import=optional:file:./.env[.properties]

# Puerto de la API
server.port=${PORT:4000}

# ---------------------------------------------------------------
#  BASE DE DATOS (PostgreSQL: AWS RDS, Neon o Supabase)
#  Los valores vienen del archivo .env (ver .env.example)
# ---------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lindavista}?sslmode=${DB_SSL:disable}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Crea/actualiza las tablas automaticamente a partir de las entidades.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.open-in-view=false

# CORS: origenes permitidos (la web y el movil)
app.cors.origins=${CORS_ORIGIN:*}

# Login: secreto para firmar los tokens (CAMBIALO en produccion: variable AUTH_SECRET)
app.auth.enabled=${AUTH_ENABLED:true}
app.auth.secret=${AUTH_SECRET:change-me-dev-secret}

# Admin inicial: se crea al arrancar si la base no tiene usuarios (ADMIN_USERNAME/ADMIN_PASSWORD)
app.admin.username=${ADMIN_USERNAME:}
app.admin.password=${ADMIN_PASSWORD:}

# Sembrar datos de ejemplo al arrancar si la base esta vacia (true/false)
app.seed.enabled=${SEED_ON_START:false}
