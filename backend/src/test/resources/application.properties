# Configuracion SOLO para pruebas: base de datos en memoria (H2).
# Permite verificar que la app arranca y mapea bien sin una base real.
spring.datasource.url=jdbc:h2:mem:lvtest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
app.cors.origins=*
app.seed.enabled=false
# Las pruebas de flujo llaman a la API sin token: desactivamos el login aqui.
app.auth.enabled=false
